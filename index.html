<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的 GitHub 个人主页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 600px;
            width: 100%;
        }
        h1 {
            color: #24292f;
            margin-bottom: 20px;
        }
        p {
            color: #656d76;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        a {
            color: #0969da;
            text-decoration: none;
            font-weight: 500;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>👋 欢迎来到我的个人主页</h1>
        <p>这是我用 GitHub Pages 搭建的第一个网站 🚀</p>
        <p>我的便签工具：<a href="/1.html">点击访问</a></p>
    </div>
</body>
</html>
