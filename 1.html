<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<!-- 这句话就是让手机能正常显示 -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的便签</title>
<style>
*{box-sizing:border-box}
body{margin:0;padding:15px;background:#f5f5f5;font-family:Arial}
.box{max-width:500px;margin:0 auto;background:white;padding:15px;border-radius:10px}
textarea{width:100%;height:100px;padding:10px;border:1px solid #ddd;border-radius:8px}
button{margin-top:8px;padding:8px 12px;border:none;background:#4285f4;color:white;border-radius:6px}
.del{background:#ff4444}
.item{background:#f9f9f9;padding:10px;margin:8px 0;border-radius:6px}
.time{font-size:12px;color:#666;margin-top:4px}
</style>
</head>
<body>
<div class="box">
  <h3>简易便签</h3>
  <textarea id="content" placeholder="写点什么..."></textarea>
  <button onclick="save()">保存</button>
  <button onclick="clearAll()" class="del">清空全部</button>
  <div id="list"></div>
</div>

<script>
function load(){
  let list = document.getElementById('list');
  let data = JSON.parse(localStorage.getItem('notes'))||[];
  list.innerHTML = '';
  data.forEach((item,i)=>{
    let div = document.createElement('div');
    div.className='item';
    div.innerHTML = `
      ${item.text}
      <div class="time">${item.time}</div>
      <button class="del" onclick="del(${i})">删除</button>
    `;
    list.appendChild(div);
  })
}

function save(){
  let text = document.getElementById('content').value.trim();
  if(!text)return alert('请输入内容');
  let data = JSON.parse(localStorage.getItem('notes'))||[];
  let time = new Date().toLocaleString();
  data.unshift({text,time});
  localStorage.setItem('notes',JSON.stringify(data));
  document.getElementById('content').value='';
  load();
}

function del(i){
  let data = JSON.parse(localStorage.getItem('notes'))||[];
  data.splice(i,1);
  localStorage.setItem('notes',JSON.stringify(data));
  load();
}

function clearAll(){
  if(confirm('确定清空？')){
    localStorage.removeItem('notes');
    load();
  }
}

load();
</script>
</body>
</html>
